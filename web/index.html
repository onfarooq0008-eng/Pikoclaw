<!DOCTYPE html>
<html>
<head>
<title>PicoClaw WebUI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family:Arial;
    background:#111827;
    color:white;
    margin:0;
}
.header{
    padding:20px;
    background:#1f2937;
    font-size:22px;
}
.box{
    margin:20px;
}
textarea,input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:0;
}
button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}
#chat{
    height:300px;
    overflow:auto;
    background:#020617;
    padding:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="header">
🤖 PicoClaw WebUI
</div>


<div class="box">

<div id="chat">
Welcome to PicoClaw
</div>


<input id="msg" placeholder="Type message">


<button onclick="send()">
Send
</button>


</div>


<script>

async function send(){

let m=document.getElementById("msg").value;

document.getElementById("chat").innerHTML += 
"<p><b>You:</b> "+m+"</p>";

let r=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:m
})
});


let data=await r.json();

document.getElementById("chat").innerHTML +=
"<p><b>PicoClaw:</b> "+JSON.stringify(data)+"</p>";

}

</script>


</body>
</html>
